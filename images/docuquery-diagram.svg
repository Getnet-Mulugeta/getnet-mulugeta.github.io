<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="380" fill="#0a0f1e"/>
  <text x="340" y="28" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#c9a84c" letter-spacing="2" font-weight="600">DOCUQUERY — RAG PIPELINE ARCHITECTURE</text>

  <!-- Row 1: Input sources -->
  <rect x="30" y="50" width="140" height="48" rx="6" fill="#162040" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.6"/>
  <text x="100" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8c97a" font-weight="600">PDF / TXT Upload</text>
  <text x="100" y="88" text-anchor="middle" font-family="monospace" font-size="10" fill="#8892a4">Personal Mode</text>

  <rect x="510" y="50" width="140" height="48" rx="6" fill="#162040" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.6"/>
  <text x="580" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8c97a" font-weight="600">USAJobs.gov API</text>
  <text x="580" y="88" text-anchor="middle" font-family="monospace" font-size="10" fill="#8892a4">Airflow DAG · 6am</text>

  <!-- Arrows to chunker -->
  <line x1="170" y1="74" x2="218" y2="74" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="74" x2="462" y2="74" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Row 1 middle: Chunker -->
  <rect x="220" y="50" width="240" height="48" rx="6" fill="#0e1628" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="340" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8c97a" font-weight="600">Text Chunker</text>
  <text x="340" y="88" text-anchor="middle" font-family="monospace" font-size="10" fill="#8892a4">500-word overlapping segments</text>

  <!-- Arrow down to embeddings -->
  <line x1="340" y1="98" x2="340" y2="128" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Row 2: Embeddings -->
  <rect x="180" y="130" width="320" height="48" rx="6" fill="#162040" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="340" y="150" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8c97a" font-weight="600">HuggingFace Embeddings</text>
  <text x="340" y="168" text-anchor="middle" font-family="monospace" font-size="10" fill="#8892a4">all-MiniLM-L6-v2 · 384-dim vectors</text>

  <!-- Arrow down to pgvector -->
  <line x1="340" y1="178" x2="340" y2="208" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Row 3: Vector DB -->
  <rect x="180" y="210" width="320" height="48" rx="6" fill="#0e1628" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="340" y="230" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8c97a" font-weight="600">PostgreSQL + pgvector</text>
  <text x="340" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#8892a4">HNSW index · cosine similarity search</text>

  <!-- Arrow down to FastAPI -->
  <line x1="340" y1="258" x2="340" y2="288" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Row 4: FastAPI + Groq -->
  <rect x="80" y="290" width="200" height="48" rx="6" fill="#162040" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.6"/>
  <text x="180" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8c97a" font-weight="600">FastAPI Backend</text>
  <text x="180" y="328" text-anchor="middle" font-family="monospace" font-size="10" fill="#8892a4">Async streaming · Rate limiting</text>

  <rect x="400" y="290" width="200" height="48" rx="6" fill="#162040" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.6"/>
  <text x="500" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8c97a" font-weight="600">Groq LLM</text>
  <text x="500" y="328" text-anchor="middle" font-family="monospace" font-size="10" fill="#8892a4">llama-3.1-8b · streaming</text>

  <line x1="280" y1="314" x2="398" y2="314" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Docker badge -->
  <rect x="30" y="290" width="40" height="48" rx="4" fill="#0e1628" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="50" y="312" text-anchor="middle" font-family="monospace" font-size="8" fill="#c9a84c">Docker</text>
  <text x="50" y="326" text-anchor="middle" font-family="monospace" font-size="8" fill="#8892a4">Compose</text>

  <!-- Railway badge -->
  <rect x="610" y="290" width="50" height="48" rx="4" fill="#0e1628" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="635" y="312" text-anchor="middle" font-family="monospace" font-size="8" fill="#c9a84c">Railway</text>
  <text x="635" y="326" text-anchor="middle" font-family="monospace" font-size="8" fill="#8892a4">Deploy</text>
</svg>
